<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    #titlebar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: #f0f0f0;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding-left: 72px;
      gap: 8px;
      z-index: 10000;
      border-bottom: 1px solid #d0d0d0;
    }

    #titlebar img {
      width: 18px;
      height: 18px;
    }

    .nav-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 15px;
      color: #555;
      line-height: 1;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(0,0,0,0.08);
      color: #111;
    }

    .nav-btn:disabled {
      color: #bbb;
      cursor: default;
    }

    #titlebar span {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-app-region: no-drag;
      cursor: pointer;
      position: relative;
    }

    #copy-tooltip {
      position: fixed;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 99999;
      white-space: nowrap;
    }

    #copy-tooltip.visible {
      opacity: 1;
    }

    webview {
      position: fixed;
      top: 36px;
      left: 0;
      width: 100%;
      height: calc(100% - 36px);
      border: none;
    }

    #session-badge {
      margin-left: auto;
      margin-right: 44px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #888;
      white-space: nowrap;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    #shrink-btn {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 9999;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 14px;
      line-height: 28px;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #shrink-btn:hover {
      background: rgba(0, 0, 0, 0.75);
    }

    #expand-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9998;
      background: rgba(20, 20, 20, 0.92);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    #expand-overlay.visible {
      display: flex;
    }

    #expand-label {
      color: #fff;
      font-size: 13px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      letter-spacing: 0.05em;
      user-select: none;
    }

    #nav-popup {
      display: none;
      position: fixed;
      z-index: 99998;
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      padding: 4px 0;
      min-width: 220px;
      max-width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }

    #nav-popup.visible {
      display: block;
    }

    .nav-popup-item {
      padding: 6px 14px;
      cursor: pointer;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    .nav-popup-item:hover {
      background: #0057d9;
      color: #fff;
    }

    .nav-popup-item.current {
      font-weight: 600;
    }

    #reload-toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 99999;
      background: rgba(30, 30, 30, 0.88);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #reload-toast.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <img src="../assets/icon.png" alt="" />
    <button id="nav-back" class="nav-btn" title="Back" disabled>&#8249;</button>
    <button id="nav-forward" class="nav-btn" title="Forward" disabled>&#8250;</button>
    <span id="titlebar-label">HTML Viewer</span>
    <span id="session-badge">default</span>
  </div>
  <div id="copy-tooltip">Copied to clipboard</div>
  <div id="nav-popup"></div>

  <webview id="webview" allowpopups></webview>

  <div id="not-found" style="display:none; position:fixed; top:36px; left:0; right:0; bottom:0;
    background:#fff; z-index:500; align-items:center; justify-content:center; flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif; color:#555; gap:8px;">
    <div style="font-size:48px;">&#128462;</div>
    <div style="font-size:16px; font-weight:500; color:#222;">File not found</div>
    <div id="not-found-path" style="font-size:12px; color:#888; max-width:500px; text-align:center; word-break:break-all;"></div>
  </div>

  <button id="shrink-btn" title="Shrink to corner">⊠</button>

  <div id="reload-toast">Reloading, file changed on disk.</div>

  <div id="expand-overlay" title="Expand window">
    <span id="expand-label">&lt; &gt;</span>
  </div>

  <script type="module" src="renderer.js"></script>
</body>
</html>
